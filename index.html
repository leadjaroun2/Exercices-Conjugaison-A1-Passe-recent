<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Le Passé Récent (A1)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #003057; /* Bleu Marine Management */
            --accent: #00A9CE;  /* Bleu Azur */
            --success: #27AE60;
            --error: #E74C3C;
            --bg: #F8FAFC;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #E2E8F0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .quiz-card {
            background: white;
            width: 95%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 40px;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .progress-container {
            flex-grow: 1;
            height: 8px;
            background: #EDF2F7;
            border-radius: 4px;
            margin: 0 20px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.4s ease;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-size: 28px;
            margin: 0 0 10px 0;
        }
        .instruction-text {
            font-size: 15px;
            color: #475569;
            font-style: italic;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .question-box {
            background: var(--bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 6px solid var(--primary);
        }
        .question-text {
            font-size: 22px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 5px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .option-btn {
            background: white;
            border: 2px solid #E2E8F0;
            padding: 18px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: #F0F9FF;
        }
        .option-btn.correct {
            background-color: #D1FAE5;
            border-color: var(--success);
            color: #065F46;
        }
        .option-btn.incorrect {
            background-color: #FEE2E2;
            border-color: var(--error);
            color: #991B1B;
        }
        .feedback {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            display: none;
        }
        .next-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            display: none;
        }
        .next-btn:hover {
            background: #002340;
        }
        #result-screen {
            text-align: center;
            display: none;
        }
        .score-big {
            font-size: 64px;
            color: var(--primary);
            font-weight: 800;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="quiz-card">
        <div id="quiz-ui">
            <div class="header">
                <span id="q-count" style="font-weight: 600; color: #64748B;">Question 1/5</span>
                <div class="progress-container">
                    <div class="progress-bar" id="p-bar"></div>
                </div>
                <span id="score-count" style="font-weight: 600; color: var(--primary);">Score: 0</span>
            </div>
            <h1>Le Passé Récent</h1>
            <div class="instruction-text">Complétez la phrase au passé récent (venir de + infinitif).</div>
            <div class="question-box">
                <div class="question-text" id="q-text">Chargement...</div>
            </div>
            <div class="options-grid" id="options"></div>
            <div class="feedback" id="feedback"></div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
        </div>

        <div id="result-screen">
            <h1>Quiz Terminé !</h1>
            <div class="score-big" id="final-score">0 / 5</div>
            <p id="res-comment" style="font-size: 18px; margin-bottom: 30px;"></p>
            <button class="next-btn" style="display:block;" onclick="initQuiz()">Recommencer / Restart</button>
        </div>
    </div>

    <script>
        // Liste des 38 verbes demandés
        const verbsPool = [
            // 1er groupe (14)
            { infinitif: "travailler", type: "normal" },
            { infinitif: "étudier", type: "voyelle" },
            { infinitif: "manger", type: "normal" },
            { infinitif: "habiter", type: "voyelle" }, // h muet
            { infinitif: "aimer", type: "voyelle" },
            { infinitif: "adorer", type: "voyelle" },
            { infinitif: "détester", type: "normal" },
            { infinitif: "parler", type: "normal" },
            { infinitif: "regarder", type: "normal" },
            { infinitif: "écouter", type: "voyelle" },
            { infinitif: "acheter", type: "voyelle" },
            { infinitif: "payer", type: "normal" },
            { infinitif: "chercher", type: "normal" },
            { infinitif: "trouver", type: "normal" },
            // Réfléchis (10)
            { infinitif: "s'appeler", type: "reflechi_voyelle" },
            { infinitif: "se réveiller", type: "reflechi_consonne" },
            { infinitif: "se lever", type: "reflechi_consonne" },
            { infinitif: "se doucher", type: "reflechi_consonne" },
            { infinitif: "s'habiller", type: "reflechi_voyelle" },
            { infinitif: "se brosser", type: "reflechi_consonne" },
            { infinitif: "se préparer", type: "reflechi_consonne" },
            { infinitif: "se reposer", type: "reflechi_consonne" },
            { infinitif: "se coucher", type: "reflechi_consonne" },
            { infinitif: "s'endormir", type: "reflechi_voyelle" },
            // 12 verbes irréguliers fondamentaux (12)
            { infinitif: "être", type: "voyelle" },
            { infinitif: "avoir", type: "voyelle" },
            { infinitif: "aller", type: "voyelle" },
            { infinitif: "venir", type: "normal" },
            { infinitif: "faire", type: "normal" },
            { infinitif: "dire", type: "normal" },
            { infinitif: "boire", type: "normal" },
            { infinitif: "prendre", type: "normal" },
            { infinitif: "vouloir", type: "normal" },
            { infinitif: "lire", type: "normal" },
            { infinitif: "écrire", type: "voyelle" },
            { infinitif: "voir", type: "normal" },
            // 2 de plus (2)
            { infinitif: "naître", type: "normal" },
            { infinitif: "arriver", type: "voyelle" }
        ];

        const sujets = [
            { pronom: "Je", venir: "viens" },
            { pronom: "Tu", venir: "viens" },
            { pronom: "Il", venir: "vient" },
            { pronom: "Elle", venir: "vient" },
            { pronom: "Nous", venir: "venons" },
            { pronom: "Vous", venir: "venez" },
            { pronom: "Ils", venir: "viennent" },
            { pronom: "Elles", venir: "viennent" }
        ];

        // Pour chaque pronom, son équivalent réfléchi (consonne et voyelle)
        const reflechis = {
            "Je": { c: "me ", v: "m'" },
            "Tu": { c: "te ", v: "t'" },
            "Il": { c: "se ", v: "s'" },
            "Elle": { c: "se ", v: "s'" },
            "Nous": { c: "nous ", v: "nous " },
            "Vous": { c: "vous ", v: "vous " },
            "Ils": { c: "se ", v: "s'" },
            "Elles": { c: "se ", v: "s'" }
        };

        let quizQuestions = [];
        let currentIdx = 0;
        let score = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Nettoie l'infinitif réfléchi brut de la liste pour n'avoir que le verbe nu
        function getCleanInfinitif(v) {
            if (v.infinitif.startsWith("se ")) return v.infinitif.substring(3);
            if (v.infinitif.startsWith("s'")) return v.infinitif.substring(2);
            return v.infinitif;
        }

        function generateQuizData() {
            let poolCopy = [...verbsPool];
            shuffleArray(poolCopy);
            let selectedVerbs = poolCopy.slice(0, 5); // Pick 5 random verbs
            
            quizQuestions = selectedVerbs.map(v => {
                // Pick a random subject
                let s = sujets[Math.floor(Math.random() * sujets.length)];
                let correctAns = "";
                let nu = getCleanInfinitif(v);

                // Construction de la bonne réponse selon le type de verbe
                if (v.type === "normal") {
                    correctAns = `${s.venir} de ${nu}`;
                } else if (v.type === "voyelle") {
                    correctAns = `${s.venir} d'${nu}`;
                } else if (v.type === "reflechi_consonne") {
                    correctAns = `${s.venir} de ${reflechis[s.pronom].c}${nu}`;
                } else if (v.type === "reflechi_voyelle") {
                    correctAns = `${s.venir} de ${reflechis[s.pronom].v}${nu}`;
                }

                // Génération de 3 fausses alternatives plausibles au niveau A1
                let wrong1 = `${s.venir} ${v.infinitif}`; // Oubli du "de"
                let wrong2 = `${s.venir} de ${v.infinitif}er`.replace("erer", "er"); // Mauvaise forme
                let wrong3 = `vais ${v.infinitif}`; // Confusion avec le futur proche

                // Si c'est réfléchi, on adapte aussi un peu les pièges
                if(v.type.startsWith("reflechi")){
                     wrong1 = `${s.venir} de ${v.infinitif}`; // Mauvais pronom réfléchi (ex: Je viens de se coucher)
                     wrong2 = `${s.venir} ${reflechis[s.pronom].c}${nu}`; // Manque le de
                }

                // S'assurer de l'unicité des options
                let options = Array.from(new Set([correctAns, wrong1, wrong2, wrong3]));
                while(options.length < 4) {
                    options.push(`${s.venir} de faire`); // Sécurité
                }

                let correctIndex = options.indexOf(correctAns);

                return {
                    text: `${s.pronom} _______________ (${v.infinitif}).`,
                    options: options,
                    answerIdx: correctIndex
                };
            });
        }

        function initQuiz() {
            document.getElementById('quiz-ui').style.display = 'block';
            document.getElementById('result-screen').style.display = 'none';
            currentIdx = 0;
            score = 0;
            document.getElementById('score-count').innerText = "Score: " + score;
            generateQuizData();
            loadQuestion();
        }

        function loadQuestion() {
            const qData = quizQuestions[currentIdx];
            document.getElementById('q-text').innerText = qData.text;
            document.getElementById('q-count').innerText = `Question ${currentIdx + 1}/5`;
            document.getElementById('p-bar').style.width = ((currentIdx + 1) / 5 * 100) + "%";

            const correctText = qData.options[qData.answerIdx];
            
            // Map et mélange des options
            let optionsMapped = qData.options.map((opt, index) => {
                return { text: opt, isCorrect: index === qData.answerIdx };
            });
            shuffleArray(optionsMapped);

            const optCont = document.getElementById('options');
            optCont.innerHTML = '';
            
            optionsMapped.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => checkAnswer(opt.isCorrect, btn, correctText);
                optCont.appendChild(btn);
            });

            document.getElementById('feedback').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
        }

        function checkAnswer(isCorrect, btn, correctText) {
            const all = document.querySelectorAll('.option-btn');
            all.forEach(b => b.disabled = true);
            
            const f = document.getElementById('feedback');
            f.style.display = 'block';

            if(isCorrect) {
                btn.classList.add('correct');
                f.innerText = "Excellent ! Correct. ✅";
                f.style.color = "var(--success)";
                score++;
                document.getElementById('score-count').innerText = "Score: " + score;
            } else {
                btn.classList.add('incorrect');
                all.forEach(b => {
                    if(b.innerText === correctText) b.classList.add('correct');
                });
                f.innerText = "Dommage ! La réponse était : " + correctText + " ❌";
                f.style.color = "var(--error)";
            }
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentIdx++;
            if(currentIdx < 5) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').innerText = score + " / 5";
            const comm = document.getElementById('res-comment');
            
            if(score === 5) comm.innerHTML = "Parfait ! Le passé récent n'a plus de secret pour vous ! 🌟";
            else if(score >= 3) comm.innerHTML = "Très bien ! Bon travail sur les structures A1. 👍";
            else comm.innerHTML = "Continuez d'apprendre et de pratiquer le passé récent ! 💪";
        }

        // Lancement automatique au chargement
        initQuiz();
    </script>
</body>
</html>
